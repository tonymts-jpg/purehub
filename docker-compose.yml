services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
    image: ${PUREHUB_IMAGE:-purehub-web:local}
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-staging}
      PUREHUB_PHASE: ${PUREHUB_PHASE:-phase-6}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_SECURE_COOKIES: ${BETTER_AUTH_SECURE_COOKIES:-false}
      DEMO_ACCOUNT_PASSWORD: ${DEMO_ACCOUNT_PASSWORD:?DEMO_ACCOUNT_PASSWORD is required}
      SERVICE_ADMIN_USER_ID: ${SERVICE_ADMIN_USER_ID:-admin-demo}
      ADMIN_ACCESS_TOKEN: ${ADMIN_ACCESS_TOKEN:?ADMIN_ACCESS_TOKEN is required}
      WORKER_ACCESS_TOKEN: ${WORKER_ACCESS_TOKEN:?WORKER_ACCESS_TOKEN is required}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_HOST: minio
      OBJECT_STORAGE_PORT: 9000
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-purehub-media}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-purehub-minio}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-purehub}:${POSTGRES_PASSWORD:-purehub_change_me}@postgres:5432/${POSTGRES_DB:-purehub}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: ${PUREHUB_IMAGE:-purehub-web:local}
    restart: unless-stopped
    command: ["node", "scripts/worker.mjs"]
    environment:
      APP_ENV: ${APP_ENV:-staging}
      PUREHUB_PHASE: ${PUREHUB_PHASE:-phase-6}
      WORKER_ACCESS_TOKEN: ${WORKER_ACCESS_TOKEN:?WORKER_ACCESS_TOKEN is required}
      WORKER_HEALTH_PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-purehub}:${POSTGRES_PASSWORD:-purehub_change_me}@postgres:5432/${POSTGRES_DB:-purehub}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-purehub}
      POSTGRES_USER: ${POSTGRES_USER:-purehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purehub_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-purehub-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-purehub-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-purehub-media}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set purehub http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "purehub/$${OBJECT_STORAGE_BUCKET}" &&
        mc anonymous set none "purehub/$${OBJECT_STORAGE_BUCKET}"

volumes:
  postgres-data:
  redis-data:
  minio-data:
